services:
  server:
    build: ./server
    ports:
      - "3001:3001"
    volumes:
      - ./uploads:/app/uploads
      - ./photos.db:/app/photos.db
    env_file:
      - ./server/.env
    restart: always

  client:
    build: ./client
    ports:
      - "5173:80" # Map host 5173 to container 80 (where nginx serves)
    depends_on:
      - server
    restart: always

volumes:
  uploads:
  db:
