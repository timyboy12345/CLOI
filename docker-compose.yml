services:
  client:
    build: ./client
    ports:
      - "5173:80"
    restart: always
    environment:
      - ./client/.env

  server:
    build: ./server
    ports:
      - "3001:3001"
    volumes:
      - sqlite_data:/data
      - uploads:/data/uploads
    restart: always
    environment:
      - ./server/.env

volumes:
  sqlite_data:
  uploads:
